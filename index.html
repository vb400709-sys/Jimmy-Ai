8<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
}

header{
background:#161b22;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

#chat{
height:70vh;
overflow-y:auto;
padding:15px;
}

.user{
text-align:right;
margin:10px;
}

.bot{
text-align:left;
margin:10px;
}

.msg{
display:inline-block;
padding:10px 15px;
border-radius:15px;
max-width:80%;
}

.user .msg{
background:#238636;
}

.bot .msg{
background:#30363d;
}

.footer{
display:flex;
padding:10px;
background:#161b22;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#238636;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<header>🤖 Jimmy AI</header>

<div id="chat">
<div class="bot">
<div class="msg">Hello Vikas 👋<br>I'm Jimmy AI Version 2.</div>
</div>
</div>

<div class="footer">
<input id="text" placeholder="Type your message...">
<button onclick="send()">Send</button>
</div>

<script>

function send(){

let input=document.getElementById("text");

let message=input.value;

if(message=="") return;

let chat=document.getElementById("chat");

chat.innerHTML+=`
<div class="user">
<div class="msg">${message}</div>
</div>
`;

let reply="";

let msg=message.toLowerCase();

if(msg.includesAQ.Ab8RN6LClivFlpHt2uWwmKKBJh8gT2f3ShsnCcHEG7E6n6RKWQ.";

setTimeout(function(){

chat.innerHTML+=`
<div class="bot">
<div class="msg">${reply}</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

},500);

input.value="";

}

</script>

</body>
</html>
